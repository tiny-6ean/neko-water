<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>猫の飲水管理</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<header class="topbar">
  <h1>猫の飲水管理</h1>
</header>

<nav class="tabs">
  <button data-tab="record">記録</button>
  <button data-tab="dashboard">ダッシュボード</button>
  <button data-tab="graph">グラフ</button>
  <button data-tab="analysis">分析</button>
  <button data-tab="settings">設定</button>
</nav>

<section id="record" class="tab-content">
  <h2>記録</h2>
  <div id="editStatus" class="edit-status"></div>

  <label for="recordDate">日付</label>
  <input type="date" id="recordDate">

  <label>猫を選ぶ</label>
  <select id="catSelect"></select>

  <label>スポット</label>
  <select id="spotSelect"></select>

  <div id="measureWeightBlock">
    <label>重量（g）</label>
    <input type="number" id="weightInput">
  </div>

  <label>写真から読み取る</label>
  <input type="file" id="photoInput" accept="image/*">

  <div id="measureVolumeBlock">
    <label>容量（ml）</label>
    <input type="number" id="volumeInput">
  </div>

  <label>
    追加蒸発補正（今日の環境差分）
    <span class="help-icon" data-help="今日だけ蒸発量が多かった／少なかった場合の“追加補正”です。普段は0のままで構いません。">？</span>
  </label>
  <input type="number" id="evapInput">
  <select id="evapUnitSelect">
    <option value="g">g</option>
    <option value="ml">ml</option>
    <option value="percent">％</option>
  </select>

  <h3>ウェット</h3>
  <select id="wetProductSelect"></select>

  <label>ウェット量（g）</label>
  <input type="number" id="wetAmountInput">

  <label>加水量（ml）</label>
  <input type="number" id="wetAddWaterInput">

  <label>メモ</label>
  <input type="text" id="memoInput">

  <button id="saveBtn">保存</button>
  <div id="recordResult"></div>
</section>

<section id="dashboard" class="tab-content">
  <h2>ダッシュボード</h2>

  <div class="dash-block">
    <h3>今日の総飲水量</h3>
    <div id="dashTotalToday">-</div>
  </div>

  <div class="dash-block">
    <h3>スポット別飲水量</h3>
    <div id="dashSpotList"></div>
  </div>

  <div class="dash-block">
    <h3>ウェット水分量</h3>
    <div id="dashWetToday">-</div>
  </div>
</section>

<section id="graph" class="tab-content">
  <h2>グラフ</h2>

  <label>猫</label>
  <select id="graphCat"></select>

  <label>スポット</label>
  <select id="graphSpot"></select>

  <label>表示範囲（日数）</label>
  <select id="graphRange">
    <option value="7">7日</option>
    <option value="14">14日</option>
    <option value="30">30日</option>
  </select>

  <canvas id="drinkChart" width="600" height="300"></canvas>

  <h3>猫比較グラフ</h3>

  <label>表示範囲（日数）</label>
  <select id="graphRangeCompare">
    <option value="7">7日</option>
    <option value="14">14日</option>
    <option value="30">30日</option>
  </select>

  <canvas id="catCompareChart" width="600" height="300"></canvas>
</section>

<section id="analysis" class="tab-content">
  <h2>分析</h2>

  <div class="analysis-block">
    <h3>今日の総飲水量</h3>
    <div id="todayDrink">-</div>
  </div>

  <div class="analysis-block">
    <h3>7日平均</h3>
    <div id="avg7">-</div>
  </div>

  <div class="analysis-block">
    <h3>スポット別割合</h3>
    <div id="ratioBox">-</div>
  </div>

  <div class="analysis-block">
    <h3>異常検知</h3>
    <div id="alertBox"></div>
  </div>

  <div class="analysis-block">
    <h3>メモ一覧（最新10件）</h3>
    <div id="memoList"></div>
  </div>
</section>

<div id="logModal" class="modal">
  <div class="modal-content">
    <span id="logModalClose" class="close">&times;</span>
    <h3>この日の記録</h3>
    <div id="logModalBody"></div>
  </div>
</div>

<section id="settings" class="tab-content">
  <h2>設定</h2>

  <h3>猫の登録 <span class="help-icon" data-help="記録・グラフ・異常検知を猫ごとに分けるための名前です。">？</span></h3>
  <input type="text" id="newCatName" placeholder="猫の名前">
  <button id="addCatBtn">追加</button>
  <div id="catList"></div>

  <h3>飲水スポットの登録 <span class="help-icon" data-help="給水器や食器など、猫が飲む水の置き場所を登録します。">？</span></h3>

  <label>スポット名</label>
  <input type="text" id="newSpotName" placeholder="例：給水器 / 食器A">

  <label>計測方式</label>
  <select id="newSpotMethod">
    <option value="weight">重量（g）</option>
    <option value="volume">容量（ml）</option>
  </select>

  <label>初期量</label>
  <input type="number" id="newSpotInit" placeholder="例：200">

  <label>
    基本蒸発量（スポットの標準値）
    <span class="help-icon" data-help="このスポットが1日で自然に減る量の“基本値”です。">？</span>
  </label>
  <input type="number" id="newSpotEvap">
  <select id="newSpotEvapUnit">
    <option value="g">g</option>
    <option value="ml">ml</option>
    <option value="percent">％</option>
  </select>

  <button id="addSpotBtn">追加</button>
  <div id="spotList"></div>

  <h3>ウェット商品の登録 <span class="help-icon" data-help="ウェットフードの水分量を自動計算するための設定です。">？</span></h3>
  <input type="text" id="newWetName" placeholder="商品名">
  <input type="number" id="newWetMoisture" placeholder="水分率（例：78）">
  <span>%</span>
  <button id="addWetBtn">追加</button>
  <div id="wetProductList"></div>

  <h3>データ管理</h3>
  <button id="exportCSV">CSVエクスポート</button>
  <button id="exportJSON">バックアップ(JSON)</button>
  <input type="file" id="importJSON" accept="application/json">

  <h3>異常検知の設定 <span class="help-icon" data-help="前日比で急に増えた／減った飲水量を検知するための閾値です。">？</span></h3>
  <label>急増閾値（ml）</label>
  <input type="number" id="thresholdUpInput" placeholder="例：40">

  <label>急減閾値（ml）</label>
  <input type="number" id="thresholdDownInput" placeholder="例：-40">

  <button id="saveThresholdBtn">保存</button>
</section>

<script type="module" src="/neko-water/js/app.js"></script>

</body>
</html>
